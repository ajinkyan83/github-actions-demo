name: Python Secret Demo
on:
  push:
jobs:
  run-python:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify Python
        run: python --version
      - name: Run Application
        run: python app.py
