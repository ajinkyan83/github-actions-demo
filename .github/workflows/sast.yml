name: CodeQL

on:
  push:
    branches:
      - develop

jobs:

  analyze:

    permissions:
      actions: read
      contents: read
      security-events: write

    runs-on: ubuntu-latest


    steps:

      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: python
      # - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v4
