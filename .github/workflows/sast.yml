name: "CodeQL Static Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to post results to the Security tab

    steps:
    # 1. Fetch code from the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Initialize the CodeQL runner for Python
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'python'

    # Note: Python is interpreted, so no compilation/build step is required

    # 3. Execute the analysis engine
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
